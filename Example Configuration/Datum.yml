# Define the Datum Resolution Precedence and Lookup Options for the Datum Configuration.
# Lower values in the Datum Resolution Precedence list take precedence over higher values.
ResolutionPrecedence:
  - Projects\$($Node.ProjectPresence)\$($Node.Project)
  - ProjectPolicies\ProjectGitRepositories
  - ProjectPolicies\ProjectGroups
  - ProjectPolicies\Project
  - OrganizationPolicies\OrganizationGroups
  - OrganizationPolicies\Organization

# Datum Handlers are used to process Datum values.
DatumHandlersThrowOnError: true

# Datum Handlers are used to process Datum values.
default_lookup_options: MostSpecific

# Configuration and LCM Versioning Settings for the Configuration. This ensures that the right version of the LCM is used to apply the configuration.
LCMConfigSettings:
  ConfigurationVersion: 0.2
  AZDOLCMVersion: 0.3
  DSCResourceVersion: 2.0

# Define the LCM Configuration Mode for the Datum Configuration.
LCMConfigurationMode:
  # The LCM Configuration Mode can be one of the following: ApplyOnly, Audit, Enforce, Scheduled
  ConfigurationMode: Scheduled
  # Define a Change Window Array that specifies when the configuration can be applied.
  # All times are UTC. The first matching window takes precedence.
  ChangeWindows:
    - StartTime: '20:00'          # Audit every night.
      EndTime: '23:59'
      ConfigurationMode: Audit
    - StartTime: '00:00'          # Enforce only during the Tuesday/Wednesday/Thursday maintenance window.
      EndTime: '02:00'
      ConfigurationMode: Enforce
      DaysOfWeek:                 # Optional: restrict window to specific days of the week (UTC).
        - Tuesday                 # Omit DaysOfWeek entirely to apply the window every day.
        - Wednesday
        - Thursday

# Datum Handlers are used to process Datum values.
DatumHandlers:
  Datum.InvokeCommand::InvokeCommand:
    SkipDuringLoad: true

# Define custom Datum lookup options.
lookup_options:

  variables:
    merge_hash_array: deep

  resources:
    merge_hash_array: UniqueKeyValTuples
    merge_options:
      tuple_keys:
        - name

